<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Touch Tool VIP</title>

<meta name="apple-mobile-web-app-capable" content="yes">

<style>
body{
  margin:0;
  font-family: Arial;
  color:white;

  /* 🌈 nền đẹp */
  background: linear-gradient(180deg,#050505,#0a0a0a,#050505);

  overflow-y:auto;
  -webkit-overflow-scrolling:touch;
}

/* HEADER */
h2{
  text-align:center;
  margin:20px 0;
  font-size:22px;
  letter-spacing:1px;
}

/* CARD GLASS */
.box{
  margin:15px;
  padding:18px;
  border-radius:18px;

  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);

  border:1px solid rgba(0,255,0,0.2);
  box-shadow:0 0 20px rgba(0,255,0,0.1);
}

/* TITLE */
.box h3{
  margin:0 0 10px 0;
  font-size:16px;
  color:#0f0;
}

/* BUTTON VIP */
.btn{
  width:100%;
  padding:12px;
  border:none;
  border-radius:12px;

  background:#ff2b2b;
  color:white;
  font-weight:bold;
  font-size:14px;

  transition:0.2s;
}

.btn.on{
  background:#00ff66;
  color:black;
  box-shadow:0 0 15px #00ff66;
}

.btn:active{
  transform:scale(0.95);
}

/* FPS BUTTON */
.fps-btn{
  margin:5px;
  padding:10px 14px;
  border-radius:10px;

  background:rgba(255,255,255,0.05);
  color:#0f0;

  border:1px solid rgba(0,255,0,0.3);
}

/* STATUS */
#status{
  text-align:center;
  margin:20px;
  color:#aaa;
  font-size:13px;
}

/* LOCK SCREEN */
#lockScreen{
  position:fixed;
  inset:0;
  display:none;
  justify-content:center;
  align-items:center;
  flex-direction:column;

  background:black;
}

#lockScreen input{
  padding:12px;
  border-radius:10px;
  border:none;
  width:70%;
  margin-bottom:10px;
}

#lockScreen button{
  padding:10px 20px;
  border:none;
  border-radius:10px;
  background:#0f0;
  font-weight:bold;
}

/* LOADING */
#loading{
  position:fixed;
  inset:0;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;

  background:black;
}

.loader{
  width:45px;
  height:45px;
  border:4px solid #0f0;
  border-top:4px solid transparent;
  border-radius:50%;
  animation:spin 1s linear infinite;
}

@keyframes spin{
  to{transform:rotate(360deg);}
}
</style>
</head>

<body>

<!-- LOADING -->
<div id="loading">
  <div class="loader"></div>
  <p>Loading VIP Tool...</p>
</div>

<!-- LOCK -->
<div id="lockScreen">
  <h3>🔒 VIP ACCESS</h3>
  <input id="keyInput" placeholder="Enter key...">
  <button onclick="unlock()">UNLOCK</button>
  <p id="lockStatus"></p>
</div>

<!-- APP -->
<div id="app" style="display:none;">
  <h2>⚡ TOUCH TOOL VIP</h2>

  <div class="box">
    <h3>Body</h3>
    <button class="btn" onclick="toggle('smooth',this)">OFF</button>
  </div>

  <div class="box">
    <h3>lock</h3>
    <button class="btn" onclick="toggle('swipe',this)">OFF</button>
  </div>

  <div class="box">
    <h3>Nhạy</h3>
    <button class="btn" onclick="toggle('accuracy',this)">OFF</button>
  </div>
  <script>
  let lockHead = 90000000000;
let lock = 100;
let aimLock = 100;
let screen = 100;
let Claw = 100;
let swipe right = 100;
let swipe up = 100;
let mind lock = 100;
</script>
  <div class="box">
    <h3>Bám</h3>
    <button class="btn" onclick="toggle('speed',this)">OFF</button>
  </div>

  <div class="box">
    <h3>FPS </h3>
    <button class="fps-btn" onclick="setFPS(60)">60</button>
    <button class="fps-btn" onclick="setFPS(90)">90</button>
    <button class="fps-btn" onclick="setFPS(120)">120</button>
  </div>

  <p id="status">Status: OFF</p>
</div>

<!-- SOUND -->
<audio id="clickSound" src="https://www.soundjay.com/buttons/sounds/button-3.mp3"></audio>
<audio id="unlockSound" src="https://www.soundjay.com/buttons/sounds/button-09.mp3"></audio>

<script>
let validKey="123";

let state={
 smooth:true,
 swipe:true,
 accuracy:true,
 speed:true
};

// SOUND
function clickSound(){
  let a=document.getElementById("clickSound");
  a.currentTime=0;
  a.play().catch(()=>{});
}

function unlockSound(){
  let a=document.getElementById("unlockSound");
  a.currentTime=0;
  a.play().catch(()=>{});
}

// LOADING
setTimeout(()=>{
  document.getElementById("loading").style.display="none";
  document.getElementById("lockScreen").style.display="flex";
},1500);

// UNLOCK
function unlock(){
  let input=document.getElementById("keyInput").value;

  if(input===validKey){
    unlockSound();
    document.getElementById("lockScreen").style.display="none";
    document.getElementById("app").style.display="block";
  }else{
    document.getElementById("lockStatus").innerText="❌ Sai key";
    clickSound();
  }
}

// TOGGLE
function toggle(type,btn){
  state[type]=!state[type];

  if(state[type]){
    btn.innerText="ON";
    btn.classList.add("on");
  }else{
    btn.innerText="OFF";
    btn.classList.remove("on");
  }

  clickSound();
  updateStatus();
  LockHead();
  Aimfor();
}

// FPS
function setFPS(fps){
  document.getElementById("status").innerText="FPS: "+fps;
  clickSound();
  LockHead();
  LockHead = 9000;
}

// STATUS
function updateStatus(){
  document.getElementById("status").innerText=
  "Smooth:"+state.smooth+
  " | Swipe:"+state.swipe+
  " | Accuracy:"+state.accuracy+
  " | Speed:"+state.speed;
}

swipe.LockHead();

</script>

</body>
        </html>
