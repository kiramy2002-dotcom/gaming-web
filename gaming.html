<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Menu Tool</title>

<style>
body{
background:#111;
font-family:Arial;
color:white;
text-align:center;
}

.menu{
width:260px;
margin:auto;
padding:20px;
background:#222;
border-radius:10px;
}

button{
width:100%;
padding:10px;
margin:6px;
background:#00ffc8;
border:none;
border-radius:6px;
cursor:pointer;
}
</style>

</head>

<body>

<div class="menu">

<h2>MENU TOOL</h2>

<button onclick="runScript()">Chạy Script</button>

<button onclick="runFile()">Chạy File</button>

<button onclick="downloadFile()">Tải File</button>

</div>

<script>

function runScript(){
alert("Script đang chạy");
}

function runFile(){
window.open("https://example.com/tool.html");
}

function downloadFile(){
window.location="https://example.com/file.zip";
}

</script>

</body>
</html>
