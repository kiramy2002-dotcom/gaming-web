<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Menu </title>

<style>
body{
    background:#0f0f0f;
    font-family:Arial;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.menu{
    background:#1b1b1b;
    width:300px;
    padding:20px;
    border-radius:15px;
    box-shadow:0 0 20px #00ffcc;
}

h2{
    text-align:center;
    color:#00ffcc;
}

.option{
    display:flex;
    justify-content:space-between;
    margin:12px 0;
    color:white;
}

.switch{
    position:relative;
    width:50px;
    height:25px;
}

.switch input{
    display:none;
}

.slider{
    position:absolute;
    cursor:pointer;
    top:0;
    left:0;
    right:0;
    bottom:0;
    background:#555;
    border-radius:25px;
    transition:0.3s;
}

.slider:before{
    position:absolute;
    content:"";
    height:19px;
    width:19px;
    left:3px;
    bottom:3px;
    background:white;
    border-radius:50%;
    transition:0.3s;
}

input:checked + .slider{
    background:#00ffcc;
}

input:checked + .slider:before{
    transform:translateX(25px);
}

button{
    width:100%;
    padding:10px;
    margin-top:15px;
    border:none;
    background:#00ffcc;
    color:black;
    font-weight:bold;
    border-radius:8px;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="menu">

<h2>MENU </h2>

<div class="option">
AIMLOCK
<label class="switch">
<input type="checkbox" onclick="sound()">
<span class="slider"></span>
</label>
</div>

<div class="option">
AIM HEAD
<label class="switch">
<input type="checkbox" onclick="sound()">
<span class="slider"></span>
</label>
</div>

<div class="option">
NHẠY TÂM
<label class="switch">
<input type="checkbox" onclick="sound()">
<span class="slider"></span>
</label>
</div>

<div class="option">
BUFF FPS
<label class="switch">
<input type="checkbox" onclick="sound()">
<span class="slider"></span>
</label>
</div>

<div class="option">
NO RECOIL
<label class="switch">
<input type="checkbox" onclick="sound()">
<span class="slider"></span>
</label>
</div>

<button onclick="alert('Đã kích hoạt menu')">
KÍCH HOẠT
</button>

</div>

<audio id="click">
<source src="https://www.soundjay.com/buttons/sounds/button-16.mp3">
</audio>

<script>
function sound(){
    document.getElementById("click").play();
}
</script>

</body>
</html>
