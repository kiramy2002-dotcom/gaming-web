<!DOCTYPE html><html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TOUCH TOOL VIP</title><style>
body{
  margin:0;
  font-family:Arial,sans-serif;
  background:linear-gradient(180deg,#050505,#0a0a0a,#050505);
  color:#fff;
}

h2{
  text-align:center;
  margin:20px 0;
}

.box{
  margin:15px;
  padding:18px;
  border-radius:18px;
  background:rgba(0,255,100,0.06); box-shadow:0 0 50px rgba(0,255,100,0.18), inset 0 0 25px rgba(0,255,100,0.08);
  border:1px solid rgba(0,255,0,0.2);
  box-shadow:0 0 15px rgba(0,255,0,0.1);
}

.box h3{
  margin:0 0 10px;
  color:#00ff66;
}

.btn,.fps-btn{
  width:100%;
  padding:12px;
  border:none;
  border-radius:12px;
  font-weight:bold;
  cursor:pointer;
}

.btn{
  background:#ff2b2b;
  color:#fff;
}

.btn.on{
  background:#00ff66;
  color:#000;
  box-shadow:0 0 15px #00ff66;
}

.fps-row{
  display:flex;
  gap:10px;
}

.fps-btn{
  background:#111;
  color:#00ff66;
  border:1px solid rgba(0,255,0,0.3);
}

#status{
  text-align:center;
  margin:20px;
  color:#bbb;
  font-size:14px;
}
</style></head>
<body><div id="lockScreen" style="position:fixed;inset:0;display:flex;flex-direction:column;justify-content:center;align-items:center;background:radial-gradient(circle at center, rgba(0,255,120,0.08), rgba(0,0,0,0.97));;display:flex;justify-content:center;align-items:center;z-index:9999;">
  <div style="width:90%;max-width:380px;padding:30px;border-radius:24px;background:rgba(255,255,255,0.05);border:1px solid rgba(0,255,100,0.25);backdrop-filter:blur(12px);box-shadow:0 0 30px rgba(0,255,100,0.15);text-align:center;">
    <h1 style="margin:0 0 10px;color:#66ff99;text-shadow:0 0 15px #00ff66, 0 0 30px #00ff66;">🔒 VIP ACCESS</h1>
    <p style="color:#bbb;font-size:14px;">Nhập key để mở khóa hệ thống</p>
    <input id="keyInput" placeholder="Enter VIP Key" style="width:100%;padding:14px;border:none;border-radius:14px;margin-top:15px;background:#111;color:#fff;box-sizing:border-box;">
    <button onclick="unlockSystem()" style="margin-top:15px;width:100%;padding:14px;border:none;border-radius:14px;background:#00ff66;font-weight:bold;font-size:15px;">UNLOCK NOW</button>
    <p id="lockStatus" style="margin-top:12px;color:#ff6666;"></p>
  </div>
</div><div id="mainApp" style="display:none;">
<h2>⚡ TOUCH TOOL VIP</h2><div class="box">
  <h3>Body Smooth</h3>
  <button class="btn" onclick="toggleFeature('smooth',this)">OFF</button>
</div><div class="box">
  <h3>Lock Aim</h3>
  <button class="btn" onclick="toggleFeature('lock',this)">OFF</button>
</div><div class="box">
  <h3>Độ Nhạy</h3>
  <button class="btn" onclick="toggleFeature('accuracy',this)">OFF</button>
</div><div class="box">
  <h3>Bám Tâm</h3>
  <button class="btn" onclick="toggleFeature('stick',this)">OFF</button>
</div><div class="box">
  <h3>Touch Boost</h3>
  <button class="btn" onclick="toggleFeature('touch',this)">OFF</button>
</div><div class="box">
  <h3>Swipe Speed</h3>
  <button class="btn" onclick="toggleFeature('swipeSpeed',this)">OFF</button>
</div><div class="box">
  <h3>Screen Optimize</h3>
  <button class="btn" onclick="toggleFeature('screen',this)">OFF</button>
</div><div class="box">
  <h3>FPS Boost</h3>
  <div class="fps-row">
    <button class="fps-btn" onclick="setFPS(60)">60 FPS</button>
    <button class="fps-btn" onclick="setFPS(90)">90 FPS</button>
    <button class="fps-btn" onclick="setFPS(120)">120 FPS</button>
  </div>
</div><div class="box">
  <h3>App Launcher</h3>
  <button class="btn" onclick="runApp('Calculator')">Mở Calculator</button>
  <button class="btn" onclick="runApp('Browser')" style="margin-top:10px;">Mở Browser</button>
  <button class="btn" onclick="runApp('Settings')" style="margin-top:10px;">Mở Settings</button>
  <button class="btn" onclick="runApp('Free Fire MAX')" style="margin-top:10px;">Mở FF MAX</button>
</div><p id="status">Status: OFF</p><audio id="toggleSound" src="https://www.soundjay.com/buttons/sounds/button-3.mp3"></audio>

<script>
const config={
  smooth:false,
  lock:false,
  accuracy:false,
  stick:false,
  touch:false,
  swipeSpeed:false,
  screen:false,
  fps:60,
  lockHead:9000,
  aimLock:100,
  swipeRight:100,
  swipeUp:100,
  touchBoost:'OFF',
  screenMode:'NORMAL',
  root:false
};

function requestRootAccess(){
  console.log('ROOT ACCESS ENABLED');
  config.root = true;
}

function optimizeFeature(type){
  requestRootAccess();
  if(type==='smooth') config.lockHead=9500;
  if(type==='lock') config.aimLock=120;
  if(type==='accuracy') config.swipeUp=150;
  if(type==='stick') config.swipeRight=150;
  if(type==='touch') config.touchBoost='HIGH';
  if(type==='swipeSpeed') config.swipeRight=200;
  if(type==='screen') config.screenMode='1080P BOOST';
}

function playToggleSound(){
  const sound = document.getElementById('toggleSound');
  sound.currentTime = 0;
  sound.play().catch(()=>{});
}

function toggleFeature(type,btn){
  config[type]=!config[type];
  playToggleSound();

  if(config[type]){
    btn.textContent='ON';
    btn.classList.add('on');
  }else{
    btn.textContent='OFF';
    btn.classList.remove('on');
  }

  optimizeFeature(type);
  updateStatus();
}

const validKey='123456';

function unlockSystem(){
  const input=document.getElementById('keyInput').value;
  if(input===validKey){
    document.getElementById('lockScreen').style.display='none';
    document.getElementById('mainApp').style.display='block';
  }else{
    document.getElementById('lockStatus').innerText='❌ Key không đúng';
  }
}

function setFPS(value){
  config.fps=value;
  updateStatus();
}

function runApp(appName){
  document.getElementById('status').innerText = `Đang chạy ứng dụng: ${appName}`;
  console.log('Running app:', appName);
}

function updateStatus(){
  document.getElementById('status').innerText=
    `Smooth: ${config.smooth} | Lock: ${config.lock} | Accuracy: ${config.accuracy} | Stick: ${config.stick} | Touch: ${config.touch} | Swipe: ${config.swipeSpeed} | Screen: ${config.screen} | FPS: ${config.fps} | ROOT: ${config.root}`;
}
</script></div>
</body>
  </html>
